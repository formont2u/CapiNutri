<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}Capynutri - Bienvenue{% endblock %}</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    /* Police de la marque */
    @font-face {
      font-family: 'Radicalis';
      src: url("{{ url_for('static', filename='radicalis.ttf') }}") format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    
    /* Fond Premium : Saumon avec un subtil dégradé */
    body {
      background: linear-gradient(135deg, #FF8C69 0%, #ff6b3d 100%); 
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
    }
    
    /* Marque & Logo avec animation d'entrée */
    .brand-landing {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeInDown 0.8s ease-out;
    }
    .brand-landing img {
      height: 120px;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      margin-bottom: 15px;
      transition: transform 0.3s ease;
    }
    .brand-landing img:hover {
      transform: scale(1.05); /* Petit effet au survol */
    }
    .brand-landing .brand-name {
      font-family: 'Radicalis', cursive;
      color: #ffffff;
      font-size: 5rem;
      text-shadow: 0 4px 15px rgba(0,0,0,0.15);
      line-height: 1;
    }

    /* Conteneur principal contraint pour que la carte ne s'étire pas trop */
    .auth-container {
      width: 100%;
      max-width: 450px;
      padding: 0 15px;
      animation: fadeInUp 0.8s ease-out;
    }

    /* Carte de formulaire "Glassmorphism" Premium */
    .panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    /* Animations fluides */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="brand-landing">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo Capynutri">
    <div class="brand-name">Capynutri</div>
  </div>
  
  <div class="auth-container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <script>
        document.addEventListener("DOMContentLoaded", function() {
          const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 4000,
            timerProgressBar: true,
            didOpen: (toast) => {
              toast.addEventListener('mouseenter', Swal.stopTimer)
              toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
          });

          {% for category, message in messages %}
            {% set swal_icon = 'success' if category == 'success' else 'error' if category == 'danger' or category == 'error' else 'warning' if category == 'warning' else 'info' %}
            Toast.fire({
              icon: '{{ swal_icon }}',
              title: '{{ message | safe }}'
            });
          {% endfor %}
        });
      </script>
    {% endif %}
  {% endwith %}

  <script>
    function getCsrfToken() {
      return document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('form').forEach((form) => {
        const method = (form.getAttribute('method') || 'get').toLowerCase();
        if (method !== 'post') return;

        let hidden = form.querySelector('input[name="csrf_token"]');
        if (!hidden) {
          hidden = document.createElement('input');
          hidden.type = 'hidden';
          hidden.name = 'csrf_token';
          form.appendChild(hidden);
        }
        hidden.value = getCsrfToken();
      });
    });
  </script>

</body>
</html>
