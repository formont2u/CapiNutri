{% extends "auth_base.html" %}
{% block title %}Inscription — Capytnurti{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="panel border-0 shadow-sm text-center p-4">
      <i class="bi bi-person-plus text-accent mb-3" style="font-size: 3rem;"></i>
      <h3 class="fw-bold mb-4">Créer un compte</h3>
      
      <form method="post">
        <div class="mb-3 text-start">
          <label class="form-label text-muted small fw-bold text-uppercase">Choisissez un pseudo</label>
          <input type="text" class="form-control" name="username" required>
        </div>
        <div class="mb-4 text-start">
          <label class="form-label text-muted small fw-bold text-uppercase">Mot de passe</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <button type="submit" class="btn btn-dark w-100 fw-bold py-2"><i class="bi bi-check2-circle"></i> S'inscrire</button>
      </form>
      
      <div class="mt-4 text-muted small">
        Déjà un compte ? <a href="{{ url_for('login') }}" class="text-accent text-decoration-none fw-bold">Se connecter</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
